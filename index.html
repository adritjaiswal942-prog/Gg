<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ashnna ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#1b102d,#4a1f67);
color:white;
text-align:center;
overflow-x:hidden;
}

.container{
padding:30px 20px;
max-width:700px;
margin:auto;
}

h1{
margin-top:20px;
font-size:2.5rem;
}

.subtitle{
opacity:.8;
margin-bottom:20px;
}

button{
background:#ff5fa2;
color:white;
border:none;
padding:12px 22px;
border-radius:25px;
font-size:1rem;
cursor:pointer;
margin:10px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:30px;
}

.gallery img{
width:180px;
height:240px;
object-fit:cover;
border-radius:15px;
}

.letter{
display:none;
margin-top:25px;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:15px;
line-height:1.8;
}

.heart{
position:fixed;
font-size:20px;
animation:float 6s linear forwards;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">

<h1>For Ashnna ❤️</h1>

<p class="subtitle">
A small thing I made for you.
</p>

<button onclick="playSong()">🎵 Play Our Song</button>
<button onclick="openLetter()">💌 Open Message</button>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

<div class="letter" id="letter">

<p>Hey Ashnna ❤️</p>

<p>
I know we had an arguement.
</p>

<p>
I just wanted to say that you mean alot to me.
</p>

<p>
One fight cant change all the good memmories we have.
</p>

<p>
Im sorry.
</p>

<p>
I'd still choose you.
</p>

<p>❤️</p>

</div>

<audio id="song">
<source src="song.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function playSong(){
document.getElementById("song").play();
}

function openLetter(){
document.getElementById("letter").style.display="block";
playSong();
}

setInterval(() => {

let heart = document.createElement("div");
heart.innerHTML = "❤️";
heart.className = "heart";

heart.style.left = Math.random()*100 + "vw";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
},6000);

},800);

</script>

</body>
</html>
